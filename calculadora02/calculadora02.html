<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="utf-8" />
	<title>Calculadora</title>
</head>

<style>
	* {
		margin: 0;
		padding: 0;
		box-sizing: border-box;
	}

	body {
		display: flex;
		justify-content: center;
		align-items: center;
		min-height: 100vh;
		background-color: #f0f0f0;
		font-family: Arial, sans-serif;
	}

	table, tr, td {
		border: 1px solid white;
		border-collapse: collapse;
	}

	/* Display */
	#display {
		width: 100%;
		height: 50px;
		font-size: 30px;
		text-align: right;
		padding: 8px;
		border: 2px solid #999;
		border-radius: 8px;
		background-color: white;
		font-family: Arial, sans-serif;
		font-weight: bold;
		margin-bottom: 5px;
	}

	/* Estilos base de botones */
	button {
		width: 50px;
		height: 50px;
		font-size: 18px;
		font-weight: bold;
		border: none;
		border-radius: 6px;
		cursor: pointer;
		box-shadow: 0 4px 0 rgba(0,0,0,0.2);
		transition: all 0.1s;
		font-family: Arial, sans-serif;
	}

	button:active {
		transform: translateY(4px);
		box-shadow: 0 0 0 rgba(0,0,0,0.2);
	}

	/* Botones numéricos - Azules */
	#btn0, #btn1, #btn2, #btn3, #btn4, #btn5, #btn6, #btn7, #btn8, #btn9 {
		background-color: #4a90e2;
		color: white;
	}

	#btn0:hover, #btn1:hover, #btn2:hover, #btn3:hover, #btn4:hover, 
	#btn5:hover, #btn6:hover, #btn7:hover, #btn8:hover, #btn9:hover {
		background-color: #357abd;
	}

	/* Botón punto - Azul */
	#btnComa {
		background-color: #4a90e2;
		color: white;
	}

	#btnComa:hover {
		background-color: #357abd;
	}

	/* Botones de operación - Verdes */
	#btnSumar, #btnRestar, #btnMultiplicar, #btnDividir {
		background-color: #7ed321;
		color: white;
	}

	#btnSumar:hover, #btnRestar:hover, #btnMultiplicar:hover, #btnDividir:hover {
		background-color: #6bb81a;
	}

	/* Botón igual - Naranja */
	#btnResultado {
		background-color: #f5a623;
		color: white;
	}

	#btnResultado:hover {
		background-color: #d48e1b;
	}

	/* Botón borrar - Rojo */
	.btnDelete {
		color: white;
		font-family: Arial;
		font-weight: bold;
		font-size: 16px;
		background-color: #d0021b;
		box-shadow: 0px 4px #BB3E22;
		width: 100%;
		height: 40px;
		border-radius: 6px;
		border-color: #BB3E22;
	}

	.btnDelete:hover {
		background-color: #a00115;
	}

	/* Ajuste de celdas */
	td {
		padding: 3px;
	}

	/* Espaciado entre botones */
	table {
		border-collapse: separate;
		border-spacing: 5px;
		background-color: #e0e0e0;
		padding: 10px;
		border-radius: 10px;
        width: 100px;	
		}
</style>

<body>

	<table>
		<tr>
			<td colspan="4">
				<input id="display" type="text" value="" disabled></input>
			</td>
		</tr>

		<tr>
			<td>
				<button id="btn7">7</button>
			</td>
			<td>
				<button id="btn8">8</button>
			</td>
			<td>
				<button id="btn9">9</button>
			</td>
			<td>
				<button id="btnSumar">+</button>
			</td>
		</tr>

		<tr>
			<td>
				<button id="btn4">4</button>
			</td>
			<td>
				<button id="btn5">5</button>
			</td>
			<td>
				<button id="btn6">6</button>
			</td>
			<td>
				<button id="btnRestar">-</button>
			</td>
		</tr>

		<tr>
			<td>
				<button id="btn3">3</button>
			</td>
			<td>
				<button id="btn2">2</button>
			</td>
			<td>
				<button id="btn1">1</button>
			</td>
			<td>
				<button id="btnMultiplicar">*</button>
			</td>
		</tr>

		<tr>
			<td>
				<button id="btn0">0</button>
			</td>
			<td>
				<button id="btnComa">.</button>
			</td>
			<td>
				<button id="btnResultado">=</button>
			</td>
			<td>
				<button id="btnDividir">/</button>
			</td>
		</tr>

		<tr>
			<td colspan="4">
				<button id="btnBorrar" class="btnDelete">Borrar</button>
			</td>
		</tr>
	</table>

</body>

<script type="text/javascript">

// Funciones para botones numéricos
function onBtn0Click()
{
	display.value += '0';
}

function onBtn1Click()
{
	display.value += '1';
}

function onBtn2Click()
{
	display.value += '2';
}

function onBtn3Click()
{
	display.value += '3';
}

function onBtn4Click()
{
	display.value += '4';
}

function onBtn5Click()
{
	display.value += '5';
}

function onBtn6Click()
{
	display.value += '6';
}

function onBtn7Click()
{
	display.value += '7';
}

function onBtn8Click()
{
	display.value += '8';
}

function onBtn9Click()
{
	display.value += '9';
}

// Función para punto decimal
function onBtnComaClick()
{
	display.value += '.';
}

// Funciones para operaciones
function onBtnSumarClick()
{
	display.value += '+';
}

function onBtnRestarClick()
{
	display.value += '-';
}

function onBtnMultiplicarClick()
{
	display.value += '*';
}

function onBtnDividirClick()
{
	display.value += '/';
}

// Función para calcular resultado
function onBtnResultadoClick()
{
	display.value = eval(display.value);
}

// Función para borrar
function onBtnBorrarClick()
{
	display.value = '';
}

// Función principal
function main()
{
	// Botones numéricos
	btn0.onclick = onBtn0Click;
	btn1.onclick = onBtn1Click;
	btn2.onclick = onBtn2Click;
	btn3.onclick = onBtn3Click;
	btn4.onclick = onBtn4Click;
	btn5.onclick = onBtn5Click;
	btn6.onclick = onBtn6Click;
	btn7.onclick = onBtn7Click;
	btn8.onclick = onBtn8Click;
	btn9.onclick = onBtn9Click;

	// Botón punto decimal
	btnComa.onclick = onBtnComaClick;

	// Botones de operación
	btnSumar.onclick = onBtnSumarClick;
	btnRestar.onclick = onBtnRestarClick;
	btnMultiplicar.onclick = onBtnMultiplicarClick;
	btnDividir.onclick = onBtnDividirClick;

	// Botón borrar
	btnBorrar.onclick = onBtnBorrarClick;

	// Botón resultado
	btnResultado.onclick = onBtnResultadoClick;
}

window.onload = main;

</script>

</html>
